services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      NODE_ENV: production
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
      MAX_UPLOAD_MB: 10
      MAX_CSV_ROWS: 5000
      AI_BATCH_SIZE: 25
      AI_BATCH_CONCURRENCY: 2
      AI_MAX_RETRIES: 2
      LLM_PROVIDER: local-fallback
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api
