services:
  - type: web
    name: groweasy-api
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        sync: false
      - key: MAX_UPLOAD_MB
        value: 10
      - key: MAX_CSV_ROWS
        value: 5000
      - key: AI_BATCH_SIZE
        value: 25
      - key: AI_BATCH_CONCURRENCY
        value: 2
      - key: AI_MAX_RETRIES
        value: 2
      - key: LLM_PROVIDER
        value: vertex
      - key: VERTEX_PROJECT_ID
        sync: false
      - key: VERTEX_LOCATION
        value: global
      - key: VERTEX_MODEL
        value: gemini-2.5-flash
